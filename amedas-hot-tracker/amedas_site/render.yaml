services:
  - type: web
    name: amedas-hot-tracker
    env: python
    plan: free
    buildCommand: "pip install -r requirements.txt"
    startCommand: "gunicorn app:app --bind 0.0.0.0:$PORT --workers 2 --threads 4 --timeout 60"
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: AMEDAS_MOCK
        value: "1"   # 実データを使う場合は "0" にする（JMA公式APIへアクセス）
      - key: PEAK_HOUR
        value: "14.5"
